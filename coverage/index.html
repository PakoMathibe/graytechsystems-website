<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Coverage Checker | GrayTech Systems - Find Fibre in Your Area</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta
      content="Check fibre coverage in your area. Find available providers like OpenServe, Vumatel, Octotel and compare prices."
      name="description"
    />
    <link href="../img/favicon.ico" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/coverage.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="coverage-header">
      <div class="container">
        <a href="../index.html" class="back-home">
          <i class="fas fa-arrow-left"></i> Back to GrayTech Home
        </a>
        <div class="header-content">
          <i class="fas fa-map-marked-alt"></i>
          <h1>Check Fibre Coverage in Your Area</h1>
          <p>
            Enter your suburb, city, or postal code to see available fibre
            providers and packages
          </p>
        </div>
      </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <div class="container">
        <div class="search-card">
          <div class="search-input-group">
            <i class="fas fa-search-location"></i>
            <input
              type="text"
              id="locationSearch"
              placeholder="Search by suburb, city, or postal code (e.g., 'Fourways', 'Cape Town', 'Sandton')"
              autocomplete="off"
            />
            <button id="searchBtn" class="btn-primary">Check Coverage</button>
          </div>
          <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
      </div>
    </section>

    <!-- Loading State -->
    <div id="loadingState" class="loading-state" style="display: none">
      <div class="spinner"></div>
      <p>Searching for available providers in your area...</p>
    </div>

    <!-- Results Section -->
    <section id="resultsSection" class="results-section" style="display: none">
      <div class="container">
        <!-- Location Info -->
        <div id="locationInfo" class="location-info"></div>

        <!-- Provider Selection -->
        <div id="providerSelection" class="provider-selection"></div>

        <!-- Package Selection -->
        <div id="packageSelection" class="package-selection"></div>

        <!-- Order Summary -->
        <div
          id="orderSummary"
          class="order-summary"
          style="display: none"
        ></div>
      </div>
    </section>

    <!-- Popular Locations Quick Links -->
    <section class="popular-locations">
      <div class="container">
        <h3><i class="fas fa-fire"></i> Popular Locations</h3>
        <div class="popular-grid" id="popularGrid"></div>
      </div>
    </section>

    <script src="data/locations.js"></script>
    <script src="data/providers.js"></script>
    <script src="data/packages.js"></script>
    <script src="js/coverage.js"></script>
  </body>
</html>
